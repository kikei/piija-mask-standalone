[package]
name = "redact-wasm"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
console_error_panic_hook = "0.1"
once_cell = "1.19"

# Sudachi dependencies
sudachiclone = "0.2.1"

[dependencies.web-sys]
version = "0.3"
features = [
  "console",
]